<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>评价数据</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body data-page="admin">
    <header class="topbar">
      <div>
        <h1>评价数据</h1>
        <p>查看客户扫码提交的评分、意见反馈和照片。</p>
      </div>
      <a class="nav-link" href="index.html">生成二维码</a>
    </header>

    <main class="layout admin-layout">
      <form id="loginPanel" class="panel login-panel">
        <div class="section-title">
          <h2>管理员登录</h2>
        </div>
        <label class="field">
          <span>账号</span>
          <input id="adminUser" autocomplete="username" placeholder="请输入账号">
        </label>
        <label class="field">
          <span>密码</span>
          <input id="adminPassword" type="password" autocomplete="current-password" placeholder="请输入密码">
        </label>
        <button id="loginButton" class="primary-button" type="submit">登录查看数据</button>
        <p id="loginStatus" class="status-text"></p>
      </form>

      <section id="dataPanel" class="panel" hidden>
        <div class="section-title">
          <h2>数据列表</h2>
          <div class="button-row">
            <button id="logoutButton" class="ghost-button" type="button">退出登录</button>
            <button id="refreshReviews" class="ghost-button" type="button">刷新</button>
            <button id="exportCsv" class="primary-button" type="button">导出 CSV</button>
          </div>
        </div>
        <p id="adminStatus" class="status-text"></p>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>时间</th>
                <th>网点编码</th>
                <th>网点名称</th>
                <th>环境得分</th>
                <th>服务得分</th>
                <th>意见反馈</th>
                <th>照片</th>
              </tr>
            </thead>
            <tbody id="reviewRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="assets/config.js?v=20260611-admin2"></script>
    <script src="assets/common.js?v=20260611-admin2"></script>
    <script src="assets/admin.js?v=20260611-admin2"></script>
  </body>
</html>
